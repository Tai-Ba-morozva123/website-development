<!DOCTYPE html>
<html>
    <head>
    <title>bootstrap Grid system</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    
    <script src="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <style>
        .col{
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h3>Equal width columns grids</h3>
    <div class="container">
        <div class="col">
            <div class="row">
                column 1
            </div>
            <div class="row">
                column 2
            </div>
            <div class="row">
                column 3
            </div>
        </div>
    </div>
</body>
</html>
