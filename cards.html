<!DOCTYPE html>
<html lang="en">

<head>
    <title>Cards</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src="https://stackpath.bootstrapcdncdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
    <h1 style="color: orange; text-align: center;">
        Codingal
    </h1>

    <div class="container">
        <div class="card" style="width: 18rem;">
            <img class="card-img-top" src="download.jpg"
                                                
                                          alt="card image cap">
            <div class="card-body">
                <h5 class="card-title">User Name</h5>
                <p class="card-text">Passionate about programming.</p>
                <a href="#" class="btn btn-primary"> See profile</a>
            </div>
        </div>

    </div>
</body>
</html>
