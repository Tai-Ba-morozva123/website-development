<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>lits</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <h2> An ordered HTML lists:</h2>
    <ol>
        <li>Orange</li>
        <li>Mango</li>
        <li>Banana</li>
        <li>Apple</li>
    </ol>

<h2> An unordered HTML lists:</h2>
<ul>
    <li>math</li>
    <li>chemistry</li>
    <li>physics</li>
    <li>biology</li>
</ul>

<h2>Definition lists:</h2>
<dl>
    <dt>tea</dt>
    <dd>-hot drink</dd>

    <dt>Juice</dt>
    <dd>-ice drinks</dd>
</dl>
</body>
