<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width" , initial-scale="1.0">
    <title>Beginner HTML and CSS</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            background-color: #f3f6f9;
            margin: 20px;
            color: #333;
        }

        h1{
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;

        }

        p{
            font-size: 16px;
            line-height: 1.5;

        }
        button{
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;

        }
        button:hover {
            background-color: #0056b3;

        }
    </style>
    </head>
    <body>
        <h1> welcome to my website</h1>
        <p>this is a basic html paragraph with some css styling applied</p>
        <button> learn more</button>
    </body>
    </html>
