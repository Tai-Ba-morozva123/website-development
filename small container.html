<!DOCTYPE html>

<html lang="en">

<head>

    <title>Small Container Activity</title>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Include Bootstrap CSS from the official CDN -->

</head>

<body>

    <div class="container-sm bg-primary text-white p-5 my-5">

        <h1>Small Responsive Container</h1>

        <p>This container is <strong>100% wide</strong> on screens smaller than 576px.</p>

        <p>On screens <strong>576px or wider</strong>, it becomes a fixed-width container (max-width: 540px).</p>

        <p>Resize your browser window to see the effect!</p>

    </div>

    <!-- Optional: Bootstrap JS for interactive components -->

    <script src="https://jsdelivr.net"></script>

</body>

</html>
