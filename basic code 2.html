<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width", initial-scale="1.0">
        <title>Beginner HTML and CSS</title>
        <style>
        body{
            font-family:'Verdana',sans-serif;
            background-color: #f0f0f0;
            margin:0;
            display: flex;
            justify-content:center;
            align-items:center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 20px 40px;
            border: 1px solid #ccc;
            border-radius: 8px
            box-shadow: 0 4px 8px;
            text-align: center;
            width: 80%;
            max-width: 500px;
        }
        h1{
            color: #333;
            margin-top: 0;
        }
        p{
            color:#666;
            font-size: 16px;
            margin-bottom: 20px;

        }
        a {
            color: #007bff;
            text-decoration: underline:none;
        }

        a:hover {
            text-decoration: underline;

        }

        </style>
    </head>
    <body>
        <div class="container">
            <h1> Hello World!</h1>
            <p> This is a beginner's webpage using HTML and CSS</p>
            <a href="https://w3schools.com" target="_blank">visit w3schools for more tutorials</a>
        </div>
    </body>
</html>
